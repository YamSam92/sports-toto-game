<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<title>스포츠토토 GAME · 랭킹에 도전!</title>
<style>
  :root{
    --bg:#0c1424; --bg2:#111c30; --panel:#16223a; --panel2:#1d2c49; --line:#2a3a5c;
    --ink:#eaf0fb; --muted:#94a3c4; --green:#21c17a; --green-d:#159a5f; --red:#ff5572;
    --gold:#ffce4d; --blue:#4f8bff;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:"Apple SD Gothic Neo","Malgun Gothic","맑은 고딕",system-ui,sans-serif;background:var(--bg);color:var(--ink);
    overflow:hidden;-webkit-font-smoothing:antialiased;}
  .app{position:fixed;inset:0;display:flex;flex-direction:column;max-width:560px;margin:0 auto;background:var(--bg);box-shadow:0 0 60px rgba(0,0,0,.5);}
  .screen{position:absolute;inset:0;display:none;flex-direction:column;}
  .screen.on{display:flex;}

  /* 시작 */
  #start{background:radial-gradient(120% 80% at 50% 0,#1a2b4d,#0c1424 70%);align-items:center;justify-content:center;text-align:center;padding:26px;overflow-y:auto;}
  .logo{font-size:54px;}
  #start h1{font-size:32px;font-weight:900;margin:6px 0 4px;letter-spacing:-1px;}
  #start h1 b{color:var(--gold);}
  #start .lead{color:var(--muted);font-size:15px;font-weight:700;line-height:1.6;margin-bottom:22px;}
  .charge-q{font-size:15px;font-weight:800;color:var(--gold);margin-bottom:10px;}
  .charge-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:340px;}
  .cbtn{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:16px 0;color:var(--ink);font-family:inherit;font-weight:900;font-size:19px;cursor:pointer;display:flex;flex-direction:column;gap:2px;align-items:center;}
  .cbtn small{font-size:11px;color:var(--muted);font-weight:700;}
  .cbtn:active{transform:translateY(2px);}
  .cbtn.rec{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold) inset;}
  .custom{display:flex;gap:8px;width:100%;max-width:340px;margin-top:10px;}
  .custom input{flex:1;min-width:0;background:#0a1120;border:1px solid var(--line);border-radius:12px;color:#fff;font-size:15px;padding:12px;font-family:inherit;text-align:right;}
  .custom button{background:linear-gradient(180deg,#27d68c,#159a5f);border:none;border-radius:12px;color:#04240f;font-weight:900;padding:0 18px;font-family:inherit;cursor:pointer;}
  .rankview{margin-top:18px;background:rgba(255,206,77,.12);border:1px solid #6b561f;color:var(--gold);border-radius:12px;padding:12px 24px;font-weight:900;font-size:15px;font-family:inherit;cursor:pointer;}
  .startnote{color:#6f7ea2;font-size:12px;margin-top:16px;line-height:1.6;max-width:360px;}

  /* 보드 */
  .topbar{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--bg2);border-bottom:1px solid var(--line);}
  .brand{font-weight:900;font-size:16px;color:#fff;display:flex;align-items:center;gap:6px;}
  .brand .dot{color:var(--green);}
  .bal{margin-left:auto;text-align:right;}
  .bal .l{font-size:10px;color:var(--muted);font-weight:700;}
  .bal .v{font-size:18px;font-weight:900;color:var(--gold);font-variant-numeric:tabular-nums;}
  .quit{background:linear-gradient(180deg,#ffd964,#f0b32a);border:none;color:#3a2700;border-radius:9px;padding:8px 12px;font-size:13px;font-weight:900;font-family:inherit;cursor:pointer;}
  .roundbar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--bg2);border-bottom:1px solid var(--line);font-size:12px;color:var(--muted);font-weight:700;}
  .roundbar .peak{margin-left:auto;color:var(--gold);font-weight:800;}
  .board{flex:1;overflow-y:auto;padding:12px 12px 8px;}
  .hint{font-size:12px;color:#6f7ea2;text-align:center;padding:0 0 8px;font-weight:600;}

  .match{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:11px;}
  .mhead{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .lg{font-size:11px;font-weight:900;padding:3px 9px;border-radius:7px;background:var(--panel2);color:#bcd0f5;border:1px solid var(--line);}
  .lg.kbo{color:#ffd28a;} .lg.lck{color:#c4a3ff;} .lg.kl{color:#9fe7c3;} .lg.epl{color:#9cc0ff;}
  .teams{font-size:15px;font-weight:800;flex:1;line-height:1.35;}
  .teams b{color:var(--muted);font-weight:700;margin:0 5px;font-size:12px;}
  .mkt{display:flex;align-items:center;gap:7px;margin-top:7px;}
  .mkt-l{flex:none;width:74px;font-size:11px;font-weight:800;color:var(--muted);line-height:1.25;}
  .mkt-l small{display:block;color:#6f7ea2;font-size:9.5px;font-weight:700;}
  .odd{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:9px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px;font-family:inherit;color:var(--ink);}
  .odd span{font-size:11px;color:var(--muted);font-weight:800;}
  .odd b{font-size:15px;font-weight:900;color:#fff;font-variant-numeric:tabular-nums;}
  .odd:active{transform:translateY(1px);}
  .odd.on{background:linear-gradient(180deg,#27d68c,#149a5d);border-color:#27d68c;}
  .odd.on span,.odd.on b{color:#04240f;}

  /* 슬립 */
  .slip{flex:none;background:var(--bg2);border-top:2px solid var(--line);padding:10px 12px 12px;}
  .slip-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .slip-head .t{font-weight:900;font-size:14px;}
  .slip-head .cnt{background:var(--green);color:#04240f;font-weight:900;font-size:12px;border-radius:999px;padding:2px 9px;}
  .slip-head .clr{margin-left:auto;background:none;border:none;color:var(--muted);font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;text-decoration:underline;}
  .legs{display:flex;flex-direction:column;gap:5px;max-height:96px;overflow-y:auto;margin-bottom:8px;}
  .leg{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:7px 10px;font-size:12px;}
  .leg .lt{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:700;}
  .leg .lo{font-weight:900;color:var(--gold);}
  .leg .x{color:var(--red);font-weight:900;cursor:pointer;font-size:14px;}
  .slip-empty{color:#6f7ea2;font-size:13px;text-align:center;padding:10px 0;font-weight:600;}
  .combrow{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:800;margin-bottom:8px;}
  .combrow .co{color:var(--gold);font-size:18px;font-weight:900;}
  .stake{display:flex;gap:6px;margin-bottom:7px;}
  .stake input{flex:1;min-width:0;background:#0a1120;border:1px solid var(--line);border-radius:10px;color:#fff;font-size:15px;padding:10px;font-family:inherit;text-align:right;font-weight:800;}
  .qadd{display:flex;gap:6px;margin-bottom:9px;}
  .qadd button{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:9px;color:var(--ink);font-size:12px;font-weight:800;padding:8px 0;font-family:inherit;cursor:pointer;}
  .winrow{display:flex;justify-content:space-between;font-size:13px;font-weight:800;margin-bottom:9px;}
  .winrow .v{color:var(--green);font-size:17px;font-weight:900;}
  .betbtn{width:100%;padding:14px;border:none;border-radius:13px;background:linear-gradient(180deg,#27d68c,#149a5d);color:#04240f;font-weight:900;font-size:17px;font-family:inherit;cursor:pointer;box-shadow:0 4px 0 #0c6e40;}
  .betbtn:active{transform:translateY(3px);box-shadow:none;}
  .betbtn:disabled{opacity:.4;box-shadow:none;}

  /* 모달 */
  .modal-bg{position:absolute;inset:0;background:rgba(0,0,0,.74);display:none;align-items:center;justify-content:center;z-index:40;padding:20px;}
  .modal-bg.on{display:flex;}
  .modal{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:18px;padding:20px;max-width:330px;width:100%;text-align:center;max-height:88%;overflow-y:auto;}
  .modal .rc{font-size:46px;}
  .modal h3{font-size:22px;font-weight:900;margin:6px 0;}
  .modal h3.win{color:var(--green);} .modal h3.lose{color:var(--red);}
  .reslist{text-align:left;margin:12px 0;display:flex;flex-direction:column;gap:6px;}
  .resleg{display:flex;align-items:center;gap:8px;background:#0e1830;border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-size:12.5px;}
  .resleg .ic{font-size:15px;} .resleg.ok{border-color:#1c6b48;} .resleg.no{border-color:#6b2030;}
  .resleg .info{flex:1;min-width:0;} .resleg .info .t{font-weight:800;}
  .resleg .info .s{color:var(--muted);font-size:11px;font-weight:600;}
  .payline{font-size:15px;font-weight:800;margin:6px 0 14px;}
  .payline b{color:var(--gold);font-size:20px;}
  .mbtn{width:100%;padding:13px;border:none;border-radius:12px;background:linear-gradient(180deg,#27d68c,#149a5d);color:#04240f;font-weight:900;font-size:16px;font-family:inherit;cursor:pointer;}

  /* 결과(정산/파산) */
  #result,#rank{overflow-y:auto;padding:30px 22px;align-items:center;}
  #result{background:radial-gradient(120% 80% at 50% 0,#13314a,#0c1424 72%);}
  #result.bust{background:radial-gradient(120% 80% at 50% 0,#3a1424,#0c1424 72%);}
  .res-ic{font-size:60px;}
  #result h2{font-size:30px;font-weight:900;margin:6px 0 4px;text-align:center;}
  #result h2.win{color:var(--gold);} #result h2.lose{color:var(--red);}
  #result .sub{text-align:center;color:var(--muted);font-weight:700;font-size:15px;margin-bottom:18px;}
  .stats{width:100%;max-width:380px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:6px 16px;margin-bottom:16px;}
  .strow{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--line);font-size:14px;}
  .strow:last-child{border-bottom:none;} .strow .k{color:var(--muted);font-weight:700;} .strow .v{font-weight:900;}
  .strow .v.red{color:var(--red);} .strow .v.gold{color:var(--gold);} .strow .v.green{color:var(--green);}
  .reg{width:100%;max-width:380px;background:#141d33;border:1px solid #4a5d2a;border-radius:14px;padding:16px;margin-bottom:14px;}
  .reg-q{font-size:15px;font-weight:900;color:var(--gold);margin-bottom:10px;text-align:center;}
  .reg-row{display:flex;gap:8px;}
  .reg-row input{flex:1;min-width:0;background:#0a1120;border:1px solid var(--line);border-radius:11px;color:#fff;font-size:15px;padding:12px;font-family:inherit;}
  .reg-row button{background:linear-gradient(180deg,#ffd964,#f0b32a);border:none;border-radius:11px;color:#3a2700;font-weight:900;padding:0 20px;font-family:inherit;cursor:pointer;}
  .res-btns{width:100%;max-width:380px;display:flex;gap:10px;}
  .btn1{flex:1;padding:14px;border:none;border-radius:13px;background:linear-gradient(180deg,#27d68c,#149a5d);color:#04240f;font-weight:900;font-size:15px;font-family:inherit;cursor:pointer;}
  .btn2{flex:1;padding:14px;border:1px solid var(--line);border-radius:13px;background:var(--panel2);color:#fff;font-weight:900;font-size:15px;font-family:inherit;cursor:pointer;}

  /* 랭킹 */
  #rank{background:radial-gradient(120% 80% at 50% 0,#2a2412,#0c1424 72%);}
  #rank h2{font-size:28px;font-weight:900;color:var(--gold);text-align:center;margin-bottom:2px;}
  #rank .sub{text-align:center;color:var(--muted);font-weight:700;font-size:14px;margin-bottom:16px;}
  .ranklist{width:100%;max-width:400px;display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
  .rrow{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;}
  .rrow.me{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold) inset;}
  .rrow.top1{background:linear-gradient(90deg,#3a3214,#16223a);}
  .rk{font-size:19px;font-weight:900;min-width:34px;text-align:center;}
  .rn{flex:1;min-width:0;font-weight:900;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .rn .d{display:block;font-size:11px;color:#6f7ea2;font-weight:700;}
  .rp{text-align:right;}
  .rp .pf{font-weight:900;font-size:16px;color:var(--green);} .rp .pf.neg{color:var(--red);}
  .rp .bl{font-size:11px;color:var(--muted);font-weight:700;}
  .rank-empty{text-align:center;color:#6f7ea2;font-weight:700;padding:30px 0;line-height:1.6;}
  .myrec{width:100%;max-width:400px;background:#15281a;border:1px solid #366b2a;border-radius:12px;padding:11px 14px;margin-bottom:12px;font-size:13.5px;font-weight:700;color:#cfe8c0;text-align:center;}
  .myrec b{color:#fff;} .myrec .mp{color:var(--gold);font-weight:900;font-size:16px;margin-left:4px;} .myrec small{display:block;color:#9bbf8c;margin-top:3px;font-size:11px;}
  .clear-ranks{margin-top:14px;background:none;border:none;color:#5b6a8c;font-size:12px;font-weight:700;text-decoration:underline;cursor:pointer;font-family:inherit;}

  .toast{position:absolute;left:50%;top:58px;transform:translateX(-50%);background:#0a1120;border:1px solid var(--line);color:#fff;padding:9px 18px;border-radius:999px;font-size:13px;font-weight:800;z-index:50;opacity:0;transition:.25s;pointer-events:none;white-space:nowrap;}
  .toast.on{opacity:1;}
</style>
</head>
<body>
<div class="app">

  <!-- 시작 -->
  <section class="screen on" id="start">
    <div class="logo">⚽🎮⚾</div>
    <h1>스포츠<b>토토</b> GAME</h1>
    <p class="lead">실제 팀에 베팅해서 <b>최대한 많이 벌어</b><br>랭킹에 이름을 올려보세요! 🏆</p>
    <div class="charge-q">💳 시작 머니를 선택하세요</div>
    <div class="charge-grid">
      <button class="cbtn" onclick="startGame(100000)">100,000원<small>10만</small></button>
      <button class="cbtn rec" onclick="startGame(300000)">300,000원<small>30만 · 추천</small></button>
      <button class="cbtn" onclick="startGame(500000)">500,000원<small>50만</small></button>
      <button class="cbtn" onclick="startGame(1000000)">1,000,000원<small>100만</small></button>
    </div>
    <div class="custom">
      <input type="number" id="customAmt" inputmode="numeric" placeholder="직접 입력 (원)">
      <button onclick="startCustom()">시작</button>
    </div>
    <button class="rankview" onclick="showRank()">🏆 랭킹 보기</button>
    <p class="startnote">💡 베팅하면 자동으로 다음 회차로 넘어가요.<br>많이 벌었을 때 <b>‘정산’</b>으로 점수를 확정하세요. 다 잃으면 게임 오버!</p>
  </section>

  <!-- 보드 -->
  <section class="screen" id="board">
    <div class="topbar">
      <div class="brand"><span class="dot">●</span> TOTO LIVE</div>
      <div class="bal"><div class="l">보유머니</div><div class="v" id="balV">0원</div></div>
      <button class="quit" onclick="cashOut()">💰 정산</button>
    </div>
    <div class="roundbar"><span id="roundV">제 1 회차</span><span>· 오늘의 경기</span><span class="peak" id="peakV">최고 0원</span></div>
    <div class="board" id="boardList"></div>
    <div class="slip">
      <div class="slip-head"><span class="t">베팅슬립</span><span class="cnt" id="slipCnt">0</span><button class="clr" onclick="clearSlip()">전체삭제</button></div>
      <div class="legs" id="legs"><div class="slip-empty">위에서 경기를 선택하세요 (여러 개 = ‘조합’)</div></div>
      <div class="combrow"><span>합산 배당</span><span class="co" id="combOdds">-</span></div>
      <div class="stake"><input type="number" id="stakeIn" inputmode="numeric" placeholder="베팅 금액 (원)" oninput="onStakeInput()"></div>
      <div class="qadd">
        <button onclick="addStake(10000)">+1만</button>
        <button onclick="addStake(50000)">+5만</button>
        <button onclick="addStake(100000)">+10만</button>
        <button onclick="maxStake()">최대</button>
      </div>
      <div class="winrow"><span>예상 당첨금</span><span class="v" id="expWin">0원</span></div>
      <button class="betbtn" id="betBtn" onclick="placeBet()" disabled>베팅하기</button>
    </div>
  </section>

  <!-- 결과(정산/파산) -->
  <section class="screen" id="result">
    <div class="res-ic" id="resIc">💰</div>
    <h2 id="resTitle">정산 완료!</h2>
    <p class="sub" id="resSub"></p>
    <div class="stats" id="resStats"></div>
    <div class="reg" id="regBox">
      <div class="reg-q" id="regQ">🏆 랭킹에 이름 올리기</div>
      <div class="reg-row"><input id="regName" maxlength="10" placeholder="이름 입력 (최대 10자)"><button onclick="submitRank()">등록</button></div>
    </div>
    <div class="res-btns">
      <button class="btn2" onclick="showRank()">🏆 랭킹</button>
      <button class="btn1" onclick="toStart()">🔁 다시 도전</button>
    </div>
  </section>

  <!-- 랭킹 -->
  <section class="screen" id="rank">
    <h2>🏆 랭킹 TOP 10</h2>
    <p class="sub">전체 순위 · 초기 자본금 대비 수익률(%)</p>
    <div class="myrec" id="myRec" style="display:none"></div>
    <div class="ranklist" id="rankList"></div>
    <div class="res-btns">
      <button class="btn2" onclick="toStart()">처음으로</button>
      <button class="btn1" onclick="backFromRank()">닫기</button>
    </div>
    <button class="clear-ranks" onclick="clearMy()">내 기록 지우기</button>
  </section>

  <div class="modal-bg" id="resModal"><div class="modal" id="resBody"></div></div>
  <div class="toast" id="toast"></div>
</div>

<script>
/* ===== 실제 팀 자료 ===== */
const LEAGUES=[
  {key:'kbo',cls:'kbo',icon:'⚾',name:'KBO',mu:2.6,sd:3.2,teams:['KIA 타이거즈','삼성 라이온즈','LG 트윈스','두산 베어스','KT 위즈','SSG 랜더스','롯데 자이언츠','한화 이글스','NC 다이노스','키움 히어로즈']},
  {key:'kl',cls:'kl',icon:'⚽',name:'K리그1',mu:2.0,sd:1.7,teams:['울산 HD','전북 현대','포항 스틸러스','FC 서울','제주 SK','대전 하나','강원 FC','김천 상무','광주 FC','대구 FC','수원 FC','FC 안양']},
  {key:'epl',cls:'epl',icon:'⚽',name:'EPL',mu:2.2,sd:1.8,teams:['리버풀','아스널','맨체스터 시티','첼시','뉴캐슬','아스톤 빌라','노팅엄 포레스트','브라이튼','본머스','브렌트포드','풀럼','크리스탈 팰리스','에버턴','웨스트햄','맨체스터 유나이티드','울버햄튼','토트넘','리즈 유나이티드','번리','선덜랜드']},
  {key:'lck',cls:'lck',icon:'🎮',name:'LCK',mu:1.8,sd:1.4,teams:['T1','젠지','디플러스 기아','KT 롤스터','DRX','농심 레드포스','한화생명','광동 프릭스','OK저축은행 브리온','BNK 피어엑스']}
];
const OVERROUND=1.0; // 공정 배당(재미용) — 운에 따라 크게 벌 수도 있음

let balance=0, startMoney=0, peak=0, betCount=0, hitCount=0, round=1, matches=[], selections={}, stakeAmt=0, rankFrom='start';

const won=n=>Math.round(n).toLocaleString('ko-KR')+'원';
const signWon=n=>(n>=0?'+':'-')+Math.abs(Math.round(n)).toLocaleString('ko-KR')+'원';
function rint(n){ return Math.floor(Math.random()*n); }
function randn(){ return (Math.random()+Math.random()+Math.random()+Math.random()+Math.random()+Math.random()-3); }
function sampleMargin(L,sA,sB){ let v=L.mu*(sA-sB)+randn()*L.sd; let m=Math.round(v);
  if(m===0){ if(L.key==='lck') m=(v>=0?1:-1);              /* LoL: 무승부 없음 */
             else if(L.key==='kbo' && Math.random()>0.18) m=(v>=0?1:-1); } /* 야구: 무승부 매우 드묾 */
  return m; }
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function toast(t){ const e=document.getElementById('toast'); e.textContent=t; e.classList.add('on'); clearTimeout(e._t); e._t=setTimeout(()=>e.classList.remove('on'),1600); }
function show(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on')); document.getElementById(id).classList.add('on'); }
function toStart(){ show('start'); }

/* ===== 시작 ===== */
function startGame(amt){
  balance=amt; startMoney=amt; peak=amt; betCount=0; hitCount=0; round=1;
  selections={}; stakeAmt=0; document.getElementById('stakeIn').value='';
  show('board'); updateBal(); genMatches();
}
function startCustom(){
  let w=Math.floor(parseInt(document.getElementById('customAmt').value,10)||0);
  if(w<10000){ toast('10,000원 이상 입력하세요'); return; }
  if(w>100000000) w=100000000; startGame(w);
}
function updateBal(){
  document.getElementById('balV').textContent=won(balance);
  document.getElementById('roundV').textContent='제 '+round+' 회차';
  document.getElementById('peakV').textContent='최고 '+won(peak);
}

/* ===== 경기 생성 ===== */
function genMatches(n){
  n=n||6; matches=[]; selections={};
  for(let i=0;i<n;i++){
    const L=LEAGUES[rint(LEAGUES.length)];
    let a=rint(L.teams.length), b; do{ b=rint(L.teams.length); }while(b===a);
    const sA=0.30+Math.random()*0.40, sB=0.30+Math.random()*0.40;
    const em=L.mu*(sA-sB); const noDraw=(L.key==='lck');
    let H=Math.round(em); if(H===0) H=(Math.random()<0.5?1:-1);
    const hcA = noDraw ? (em>=0?-1.5:1.5) : -H;   // 핸디캡(팀A 기준 가산값) · LoL은 .5라인→무승부 없음
    const N=700; let cW=0,cD=0,cL=0,hW=0,hD=0,hL=0;
    for(let k=0;k<N;k++){ const m=sampleMargin(L,sA,sB);
      if(m>0)cW++; else if(m<0)cL++; else cD++;
      const hm=m+hcA; if(hm>0)hW++; else if(hm<0)hL++; else hD++; }
    const od=c=>{ let p=Math.max(c/N,0.012); let o=(1/p)/OVERROUND; return Math.min(Math.max(Math.round(o*100)/100,1.05),30); };
    const odds={w:od(cW),l:od(cL),hw:od(hW),hl:od(hL)};
    if(!noDraw){ odds.d=od(cD); odds.hd=od(hD); }
    matches.push({id:i,L,a:L.teams[a],b:L.teams[b],sA,sB,hcA,noDraw,odds});
  }
  renderBoard(); renderSlip();
}
function hcLabel(M){ const v=M.hcA; return M.a+' '+(v>0?'+':'')+v; }
function renderBoard(){
  document.getElementById('boardList').innerHTML = matches.map(M=>{
    const o=M.odds, sel=selections[M.id];
    const cls=(mk,pk)=> (sel&&sel.market===mk&&sel.pick===pk)?' on':'';
    const btn=(mk,pk,lb,odd)=> `<button class="odd m${M.id}${cls(mk,pk)}" onclick="sel(this,${M.id},'${mk}','${pk}',${odd})"><span>${lb}</span><b>${odd.toFixed(2)}</b></button>`;
    const gRow=btn('g','w','승',o.w)+(M.noDraw?'':btn('g','d','무',o.d))+btn('g','l','패',o.l);
    const hRow=btn('h','w','핸디승',o.hw)+(M.noDraw?'':btn('h','d','핸디무',o.hd))+btn('h','l','핸디패',o.hl);
    return `<div class="match">
      <div class="mhead"><span class="lg ${M.L.cls}">${M.L.icon} ${M.L.name}</span><span class="teams">${esc(M.a)} <b>VS</b> ${esc(M.b)}</span></div>
      <div class="mkt"><span class="mkt-l">${M.noDraw?'승 · 패':'승무패'}</span>${gRow}</div>
      <div class="mkt"><span class="mkt-l">핸디캡<small>기준 ${esc(hcLabel(M))}</small></span>${hRow}</div>
    </div>`;
  }).join('');
}
const PICKLABEL={gw:'승',gd:'무',gl:'패',hw:'핸디승',hd:'핸디무',hl:'핸디패'};
function sel(el,id,market,pick,odds){
  const cur=selections[id];
  document.querySelectorAll('.m'+id).forEach(b=>b.classList.remove('on'));
  if(cur && cur.market===market && cur.pick===pick){ delete selections[id]; }
  else { selections[id]={id,market,pick,odds}; el.classList.add('on'); }
  renderSlip();
}
function clearSlip(){ selections={}; document.querySelectorAll('.odd.on').forEach(b=>b.classList.remove('on')); renderSlip(); }
function renderSlip(){
  const legs=Object.values(selections);
  document.getElementById('slipCnt').textContent=legs.length;
  const box=document.getElementById('legs');
  if(!legs.length){ box.innerHTML='<div class="slip-empty">위에서 경기를 선택하세요 (여러 개 = ‘조합’)</div>'; }
  else { box.innerHTML=legs.map(l=>{ const M=matches[l.id];
    return `<div class="leg"><span class="lt">${esc(M.a)} vs ${esc(M.b)} · <b style="color:#cfe0ff">${PICKLABEL[l.market+l.pick]}</b></span><span class="lo">${l.odds.toFixed(2)}</span><span class="x" onclick="unsel(${l.id})">✕</span></div>`;
  }).join(''); }
  const comb=legs.reduce((p,l)=>p*l.odds,1);
  document.getElementById('combOdds').textContent=legs.length?comb.toFixed(2):'-';
  document.getElementById('expWin').textContent=won(stakeAmt*comb);
  document.getElementById('betBtn').disabled=!(legs.length>0 && stakeAmt>=1000 && stakeAmt<=balance);
}
function unsel(id){ delete selections[id]; document.querySelectorAll('.m'+id).forEach(x=>x.classList.remove('on')); renderSlip(); }
function onStakeInput(){ stakeAmt=Math.floor(parseInt(document.getElementById('stakeIn').value,10)||0); renderSlip(); }
function addStake(v){ stakeAmt=Math.min((stakeAmt||0)+v,balance); document.getElementById('stakeIn').value=stakeAmt; renderSlip(); }
function maxStake(){ stakeAmt=balance; document.getElementById('stakeIn').value=stakeAmt; renderSlip(); }

/* ===== 정산 ===== */
function checkLeg(leg,m,M){
  if(leg.market==='g'){ return leg.pick==='w'?m>0:leg.pick==='l'?m<0:m===0; }
  const hm=m+M.hcA; return leg.pick==='w'?hm>0:leg.pick==='l'?hm<0:hm===0;
}
function outcomeText(M,m){ return m>0?esc(M.a)+' '+m+'점차 승':m<0?esc(M.b)+' '+(-m)+'점차 승':'무승부'; }
function placeBet(){
  const legs=Object.values(selections);
  if(!legs.length){ toast('경기를 선택하세요'); return; }
  if(stakeAmt<1000){ toast('최소 1,000원 이상'); return; }
  if(stakeAmt>balance){ toast('보유머니가 부족해요'); return; }
  balance-=stakeAmt; betCount++;
  const comb=legs.reduce((p,l)=>p*l.odds,1);
  let allWin=true;
  const results=legs.map(l=>{ const M=matches[l.id]; const m=sampleMargin(M.L,M.sA,M.sB); const w=checkLeg(l,m,M); if(!w) allWin=false; return {l,M,m,w}; });
  let payout=0;
  if(allWin){ payout=Math.round(stakeAmt*comb); balance+=payout; hitCount++; }
  if(balance>peak) peak=balance;
  updateBal();
  showResultModal(results, allWin, payout, stakeAmt, comb);
}
function showResultModal(results, allWin, payout, stake, comb){
  const list=results.map(r=>`<div class="resleg ${r.w?'ok':'no'}"><span class="ic">${r.w?'✅':'❌'}</span><div class="info"><div class="t">${esc(r.M.a)} vs ${esc(r.M.b)} · ${PICKLABEL[r.l.market+r.l.pick]}</div><div class="s">결과: ${outcomeText(r.M,r.m)}</div></div></div>`).join('');
  document.getElementById('resBody').innerHTML=
    '<div class="rc">'+(allWin?'🎉':'💧')+'</div><h3 class="'+(allWin?'win':'lose')+'">'+(allWin?'적중! 당첨':'낙첨')+'</h3>'+
    '<div class="reslist">'+list+'</div>'+
    '<div class="payline">'+(allWin?'베팅 '+won(stake)+' × '+comb.toFixed(2)+' = <b>'+won(payout)+'</b>':'<span style="color:var(--red)">-'+won(stake)+'</span> 잃었습니다')+'</div>'+
    '<button class="mbtn" onclick="closeResult()">'+(balance<1000?'결과 보기':'다음 회차 ▶')+'</button>';
  document.getElementById('resModal').classList.add('on');
}
function closeResult(){
  document.getElementById('resModal').classList.remove('on');
  if(balance<1000){ endRun(true); return; }
  round++; stakeAmt=0; document.getElementById('stakeIn').value=''; genMatches(); updateBal();
}
function cashOut(){ endRun(false); }

/* ===== 결과 화면 ===== */
let pendingScore=null;
function endRun(busted){
  const profit=peak-startMoney;
  const pct=startMoney>0?profit/startMoney*100:0;   // 랭킹 점수 = 초기 자본금 대비 수익률(%)
  const pctStr=(pct>=0?'+':'')+Math.round(pct)+'%';
  const R=document.getElementById('result'); R.classList.toggle('bust',busted);
  document.getElementById('resIc').textContent=busted?'💸':(profit>0?'🤑':'🙂');
  const h=document.getElementById('resTitle'); h.textContent=busted?'게임 오버':'정산 완료!'; h.className=busted?'lose':'win';
  document.getElementById('resSub').textContent=busted?'모두 잃었지만, 최고 기록은 랭킹에 남길 수 있어요!':(profit>0?'잘했어요! 수익률을 등록하세요 🎉':'아쉽! 그래도 기록을 남겨봐요');
  document.getElementById('resStats').innerHTML=
    '<div class="strow"><span class="k">시작 머니</span><span class="v">'+won(startMoney)+'</span></div>'+
    '<div class="strow"><span class="k">최종 보유머니</span><span class="v">'+won(balance)+'</span></div>'+
    '<div class="strow"><span class="k">최고 기록</span><span class="v">'+won(peak)+'</span></div>'+
    '<div class="strow"><span class="k">🏆 수익률 (랭킹 점수)</span><span class="v gold">'+pctStr+'</span></div>'+
    '<div class="strow"><span class="k">베팅 / 적중</span><span class="v">'+betCount+'회 / '+hitCount+'회</span></div>';
  pendingScore={profit, balance:peak, start:startMoney};
  document.getElementById('regBox').style.display='';
  document.getElementById('regQ').textContent='🏆 수익률 '+pctStr+' · 랭킹에 등록!';
  document.getElementById('regName').value='';
  show('result');
}
function submitRank(){
  if(!pendingScore) return;
  const nm=(document.getElementById('regName').value||'').trim();
  if(!nm){ toast('이름을 입력하세요'); return; }
  const e={name:nm.slice(0,10), profit:pendingScore.profit, balance:pendingScore.balance, start:pendingScore.start, pct:pendingScore.profit/pendingScore.start*100, t:Date.now()};
  saveMyRecord(e);                 // 내 기록만 로컬에 저장
  pendingScore=null;
  document.getElementById('regBox').style.display='none';
  toast('등록 중...');
  postRank(e).then(top=>{ toast(top?'랭킹에 등록했어요! 🏆':'서버 연결 실패 — 내 기록은 저장됨'); openRank(top); });
}

/* ===== 랭킹: 공용 TOP10(서버) + 내 기록(로컬) ===== */
const RANKS_API='/.netlify/functions/ranks';
function loadMy(){ try{ return JSON.parse(localStorage.getItem('toto_me')||'null'); }catch(e){ return null; } }
function saveMyRecord(e){ const cur=loadMy(); if(!cur || e.pct>cur.pct){ try{ localStorage.setItem('toto_me', JSON.stringify(e)); }catch(_){} } }
function clearMy(){ if(confirm('내 기록(이 기기 저장)을 지울까요?')){ try{ localStorage.removeItem('toto_me'); }catch(_){} renderMyRec(); toast('내 기록을 지웠어요'); } }
async function fetchRanks(){ try{ const r=await fetch(RANKS_API,{cache:'no-store'}); if(!r.ok) throw 0; return await r.json(); }catch(e){ return null; } }
async function postRank(e){ try{ const r=await fetch(RANKS_API,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({name:e.name,profit:e.profit,balance:e.balance,start:e.start})}); if(!r.ok) throw 0; return await r.json(); }catch(err){ return null; } }
function backFromRank(){ show(rankFrom==='result'?'result':'start'); }
async function showRank(){
  rankFrom = document.getElementById('result').classList.contains('on') ? 'result' : 'start';
  show('rank'); renderMyRec();
  document.getElementById('rankList').innerHTML='<div class="rank-empty">불러오는 중...</div>';
  renderRank(await fetchRanks());
}
function openRank(top){ rankFrom='result'; show('rank'); renderRank(top); }
function renderMyRec(){
  const m=loadMy(), box=document.getElementById('myRec');
  if(!m){ box.style.display='none'; return; }
  box.style.display=''; box.innerHTML='⭐ 내 최고 기록 · <b>'+esc(m.name)+'</b> <span class="mp">'+(m.pct>=0?'+':'')+Math.round(m.pct)+'%</span><small>시작 '+won(m.start)+' → 최고 '+won(m.balance)+'</small>';
}
function renderRank(top){
  renderMyRec();
  const box=document.getElementById('rankList');
  if(top===null){ box.innerHTML='<div class="rank-empty">⚠️ 랭킹 서버에 연결할 수 없어요.<br>(배포된 사이트에서 인터넷 연결 시 표시됩니다)</div>'; return; }
  if(!top.length){ box.innerHTML='<div class="rank-empty">아직 등록된 기록이 없어요.<br>1등에 도전해 보세요! 🏆</div>'; return; }
  const my=loadMy(); const medal=i=>['🥇','🥈','🥉'][i]||(i+1);
  box.innerHTML=top.slice(0,10).map((e,i)=>{ const p=(e.pct!=null)?e.pct:(e.start>0?e.profit/e.start*100:0); const me=my&&e.name===my.name;
    return `<div class="rrow ${me?'me':''} ${i===0?'top1':''}">
    <div class="rk">${medal(i)}</div>
    <div class="rn">${esc(e.name)}${me?' <span style="color:var(--gold)">(나)</span>':''}<span class="d">시작 ${won(e.start)}</span></div>
    <div class="rp"><div class="pf">${(p>=0?'+':'')+Math.round(p)}%</div><div class="bl">최고 ${won(e.balance)}</div></div>
  </div>`; }).join('');
}
